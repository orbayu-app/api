kind: pipeline
type: docker
name: default

trigger:
  branch:
    - 5-deployment-setup
  event:
    - push

_env: &env
  INFRA_VERSION: 5-deployment-setup

steps:
  - name: clone-infra
    image: alpine/git:latest
    depends_on: []
    environment:
      <<: *env
    commands:
      - git clone https://github.com/orbayu-app/infra.git .infra
      - cd .infra && git checkout $INFRA_VERSION && cd ..
      - mkdir -p .infra/project
      # copy all files except .infra itself to .infra/project
      - find . -maxdepth 1 -not -name '.infra' -not -name '.' -exec cp -r {} .infra/project/ \;

  - name: test
    image: docker:27.3-cli
    depends_on: [clone-infra]
    volumes:
      - name: docker-sock
        path: /var/run/docker.sock
    environment:
      <<: *env
    commands:
      - cd .infra
      - >
        docker build --quiet --load
        --target test
        --build-arg PROJECT_PATH=./project
        --tag orbayu-php:${DRONE_COMMIT_SHA:0:8}-test
        --file php.dockerfile .
      - docker run --rm orbayu-php:${DRONE_COMMIT_SHA:0:8}-test composer check


